<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <style>
        .error {
            color: red;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <h2>Registration Form</h2>
    <form id="registrationForm">
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name"><br>
        <span id="nameError" class="error"></span><br>
        <label for="email">Email:</label><br>
        <input type="text" id="email" name="email"><br>
        <span id="emailError" class="error"></span><br>
        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password"><br>
        <span id="passwordError" class="error"></span><br>
        <label for="confirmPassword">Confirm Password:</label><br>
        <input type="password" id="confirmPassword" name="confirmPassword"><br>
        <span id="confirmPasswordError" class="error"></span><br>
        <label for="phone">Phone:</label><br>
        <input type="text" id="phone" name="phone"><br>
        <span id="phoneError" class="error"></span><br><br>
        <input type="submit" value="Register">
    </form>
    <script>
        const form = document.getElementById('registrationForm');
        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const phoneInput = document.getElementById('phone');
        const nameError = document.getElementById('nameError');
        const emailError = document.getElementById('emailError');
        const passwordError = document.getElementById('passwordError');
        const confirmPasswordError = document.getElementById('confirmPasswordError');
        const phoneError = document.getElementById('phoneError');
       </script>
        <script>
            // Validation logic will go here
            nameInput.addEventListener('blur', () => {
                if (nameInput.value.trim() === '') {
                    nameError.textContent = 'Name is required.';
                } else {
                    nameError.textContent = '';
                }
            });
            emailInput.addEventListener('blur', () => {
                const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (emailInput.value.trim() === '') {
                    emailError.textContent = 'Email is required.';
                } else if (!emailPattern.test(emailInput.value)) {
                    emailError.textContent = 'Please enter a valid email address.';
                } else {
                    emailError.textContent = '';
                }
            });

            passwordInput.addEventListener('blur', () => {
                if (passwordInput.value.trim() === '') {
                    passwordError.textContent = 'Password is required.';
                } else if (passwordInput.value.length <script> 6) {
                    passwordError.textContent = 'Password must be at least 6 characters long.';
                } else {
                    passwordError.textContent = '';
                }
            });

            confirmPasswordInput.addEventListener('blur', () => {
                if (confirmPasswordInput.value.trim() === '') {
                    confirmPasswordError.textContent = 'Please confirm your password.';
                } else if (confirmPasswordInput.value !== passwordInput.value) {
                    confirmPasswordError.textContent = 'Passwords do not match.';
                } else {
                    confirmPasswordError.textContent = '';
                }
            });

            phoneInput.addEventListener('blur', () => {
                const phonePattern = /^\d{10}$/;
                if (phoneInput.value.trim() === '') {
                    phoneError.textContent = 'Phone number is required.';
                } else if (!phonePattern.test(phoneInput.value)) {
                    phoneError.textContent = 'Please enter a valid 10-digit phone number.';
                } else {
                    phoneError.textContent = '';
                }
            });

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                // Trigger blur events to validate all fields
                nameInput.dispatchEvent(new Event('blur'));
                emailInput.dispatchEvent(new Event('blur'));
                passwordInput.dispatchEvent(new Event('blur'));
                confirmPasswordInput.dispatchEvent(new Event('blur'));
                phoneInput.dispatchEvent(new Event('blur'));

                // Check if there are any errors
                if (!nameError.textContent && !emailError.textContent && !passwordError.textContent && !confirmPasswordError.textContent && !phoneError.textContent) {
                    alert('Form submitted successfully!');
                    form.reset();
                } else {
                    alert('Please fix the errors in the form before submitting.');
                }
            });
            
        </script>
        </body>
        </html>
